# Validate devcontainer-feature.json files
#
# Triggered on every push to main, every pull request, and manual dispatch.
# This workflow runs the non-test validation gate in three parallel jobs:
#   1. JSON schema validation of every devcontainer-feature.json file.
#   2. shellcheck on all shell scripts (installers, tests, helpers, hooks).
#   3. README sync check ensuring each feature README matches its JSON metadata.

name: "Validate devcontainer-feature.json files"
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - '.github/workflows/validate.yml'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  # Validate the JSON metadata schema for every feature.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Validate devcontainer-feature.json files"
        uses: devcontainers/action@v1
        with:
          validate-only: "true"
          base-path-to-features: "./src"

  # Static analysis for all shell scripts in the repo.
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install shellcheck"
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: "Run shellcheck"
        run: |
          shellcheck --severity=warning scripts/local-ci.sh .githooks/pre-commit
          shellcheck --severity=warning src/*/install.sh src/*/uninstall.sh
          # Claude hooks policy scripts (not only installers)
          while IFS= read -r -d '' script; do
            shellcheck --severity=warning "$script"
          done < <(find src/claude-code-hooks/hooks -type f -name '*.sh' -print0 2>/dev/null)
          while IFS= read -r -d '' script; do
            shellcheck --severity=warning "$script"
          done < <(find src -maxdepth 2 -type f -name 'merge-settings.sh' -print0 2>/dev/null)
          shellcheck --severity=warning test/*/*.sh
          shellcheck --severity=warning test/_global/*.sh

  # Ensure feature READMEs stay in sync with devcontainer-feature.json metadata.
  # The pre-commit hook enforces the same check locally.
  readme-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install uv"
        uses: astral-sh/setup-uv@v5

      - name: "Check feature READMEs are in sync"
        run: uv run python scripts/generate-feature-readmes.py --check

  # Ensure docs/ and other markdown files are properly formatted.
  # The pre-commit hook enforces the same check locally.
  docs-check:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: "Install uv"
        uses: astral-sh/setup-uv@v5

      - name: "Check markdown formatting"
        run: uvx --with mdformat-gfm mdformat --check docs/ .github/CONTRIBUTING.md .github/CODE_OF_CONDUCT.md .github/SECURITY.md
