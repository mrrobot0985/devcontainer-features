name: "Validate devcontainer-feature.json files"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Validate devcontainer-feature.json files"
        uses: devcontainers/action@v1
        with:
          validate-only: "true"
          base-path-to-features: "./src"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install shellcheck"
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: "Run shellcheck"
        run: |
          shellcheck --severity=warning scripts/local-ci.sh .githooks/pre-commit
          shellcheck --severity=warning src/*/install.sh src/*/uninstall.sh
          shellcheck --severity=warning test/*/*.sh
          shellcheck --severity=warning test/_global/*.sh

  readme-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install uv"
        uses: astral-sh/setup-uv@v5

      - name: "Check feature READMEs are in sync"
        run: uv run python scripts/generate-feature-readmes.py --check
