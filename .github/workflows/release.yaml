# Release dev container features
#
# Triggered only when a prefixed tag of the form `<feature-name>-v<semver>` is
# pushed. Publishes the feature whose source directory matches the tag prefix
# to GitHub Container Registry using the devcontainers publish action.

name: "Release dev container features"
on:
  push:
    tags:
      - '*-v*'

jobs:
  deploy:
    if: ${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: "Publish Features"
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
