# Auto-release changed features
#
# Runs weekly and on demand. For each feature that has changed since its latest
# prefixed release tag, this workflow bumps the patch version in
# devcontainer-feature.json and opens a pull request. After the PR merges,
# `.github/workflows/tag-release.yml` creates the release tags, which in turn
# trigger `.github/workflows/release.yaml` to publish to GHCR.

name: "Auto-release changed features"

on:
  schedule:
    # Every Sunday at 03:17 UTC (off-peak, avoids :00 and :30)
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Install uv"
        uses: astral-sh/setup-uv@v5

      - name: "Bump changed feature versions"
        id: bump
        run: |
          set -euo pipefail

          changed=0
          # Walk every feature source directory and compare it against the
          # latest prefixed tag (e.g. claude-code-hooks-v0.2.0).
          for feature_dir in src/*/; do
              feature_dir="${feature_dir%/}"
              feature_id="$(basename "$feature_dir")"
              json_file="$feature_dir/devcontainer-feature.json"

              if [ ! -f "$json_file" ]; then
                  echo "SKIP: $feature_id — no devcontainer-feature.json"
                  continue
              fi

              # Find latest tag for this feature.
              latest_tag="$(git tag -l "$feature_id-v*" --sort=-v:refname | head -n 1)"
              if [ -z "$latest_tag" ]; then
                  echo "SKIP: $feature_id — no existing tag"
                  continue
              fi

              tag_commit="$(git rev-parse "$latest_tag^{commit}")"

              # Compare only the feature's own source directory against the tag.
              if git diff --quiet "$tag_commit" HEAD -- "$feature_dir"; then
                  echo "UNCHANGED: $feature_id ($latest_tag)"
                  continue
              fi

              echo "CHANGED: $feature_id ($latest_tag → bumping patch)"

              current_version="$(jq -r '.version' "$json_file")"
              major="$(echo "$current_version" | cut -d. -f1)"
              minor="$(echo "$current_version" | cut -d. -f2)"
              patch="$(echo "$current_version" | cut -d. -f3)"
              new_patch="$((patch + 1))"
              new_version="${major}.${minor}.${new_patch}"

              # Update the version field in place.
              jq --arg v "$new_version" '.version = $v' "$json_file" > "${json_file}.tmp"
              mv "${json_file}.tmp" "$json_file"

              changed=1
          done

          # Set step output so the PR creation step can be skipped when nothing changed.
          if [ "$changed" -eq 0 ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No features changed since their last tag."
          else
              echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Create release pull request"
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/bump-feature-versions
          delete-branch: true
          title: "chore: bump feature versions"
          body: |
            Automated patch version bumps for features that changed since their
            latest release tag. CI must pass before this PR is merged; tags are
            created only after merge by the `tag-release.yml` workflow.
          commit-message: "chore: bump feature versions"
