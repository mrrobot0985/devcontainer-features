# CI - Test Features
#
# Triggered on every push to main, every pull request, and manual dispatch.
# This workflow is the primary test gate for the repository. It builds each
# feature in three modes:
#   1. Autogenerated default-option tests across a matrix of base images.
#   2. Per-feature scenario tests defined in test/<feature>/scenarios.json.
#   3. Global integration scenarios that exercise multiple features together.
#
# The feature list is discovered from src/*/ so new features are included
# without editing this file. A final test-summary job fails the workflow if
# any required test job failed.

name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # Discover feature ids under src/ so matrices stay in sync with the tree.
  # The `env` context is not available in `strategy.matrix`, so a setup job
  # is the idiomatic way to share a list across matrices.
  setup:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.features.outputs.list }}
    steps:
      - uses: actions/checkout@v4

      - id: features
        run: |
          set -euo pipefail
          list="$(
            find src -mindepth 1 -maxdepth 1 -type d -printf '%f\n' \
              | sort \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )"
          echo "Discovered features: $list"
          echo "list=$list" >> "$GITHUB_OUTPUT"

  # Default-install tests across a matrix of common base images.
  test-autogenerated:
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ${{ fromJSON(needs.setup.outputs.features) }}
        baseImage:
          - debian:latest
          - ubuntu:latest
          - mcr.microsoft.com/devcontainers/base:ubuntu
        exclude:
          # These features perform network-dependent git clones/installs by
          # default; the scenario matrix tests them with explicit options.
          - features: claude-code-skills
          - features: claude-code-plugins
          - features: devcontainer-ci-tools
          - features: direnv-integration
          - features: taskfile-dev
          - features: docker-compose-helper
          - features: nix-package-manager
          - features: podman-checkpoint-helper
          - features: otel-collector-dev
          - features: sops-secret-manager
          - features: git-hooks-manager
          - features: mkdocs-material
          - features: act-runner
          - features: bruno-api-testing
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  # Scenario tests from test/<feature>/scenarios.json.
  test-scenarios:
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ${{ fromJSON(needs.setup.outputs.features) }}
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated .

  # Cross-feature integration scenarios from test/_global/scenarios.json.
  test-global:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .

  # Final evaluator: fail the workflow if any required test job failed.
  # `if: always()` ensures this runs even when earlier jobs fail, while the
  # skipped-only short-circuit keeps the workflow green when nothing ran.
  test-summary:
    runs-on: ubuntu-latest
    needs: [test-autogenerated, test-scenarios, test-global]
    if: always()
    steps:
      - name: Evaluate test results
        run: |
          if [[ "${{ needs.test-autogenerated.result }}" == "skipped" ]] && \
             [[ "${{ needs.test-scenarios.result }}" == "skipped" ]] && \
             [[ "${{ needs.test-global.result }}" == "skipped" ]]; then
            echo "All test jobs were skipped — nothing to evaluate."
            exit 0
          fi

          failed=0
          if [[ "${{ needs.test-autogenerated.result }}" == "failure" ]]; then
            echo "FAIL: test-autogenerated"; failed=1
          fi
          if [[ "${{ needs.test-scenarios.result }}" == "failure" ]]; then
            echo "FAIL: test-scenarios"; failed=1
          fi
          if [[ "${{ needs.test-global.result }}" == "failure" ]]; then
            echo "FAIL: test-global"; failed=1
          fi

          if [ "$failed" -eq 1 ]; then
            echo "One or more test jobs failed."
            exit 1
          fi
          echo "All required test jobs passed."
