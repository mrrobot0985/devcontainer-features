# CI - Test Features
#
# Cost-conscious matrix:
#   - Pull requests: only features touched under src/<id>/ or test/<id>/,
#     one base image for autogenerated tests.
#   - main / workflow_dispatch: every feature under src/, still one base
#     image (multi-distro coverage can be added later as a scheduled job).
#   - Scenarios run only for selected features that have scenarios.json.
#   - Global scenarios always run (single job).
#
# Full multi-image autogenerated matrices are intentionally not used on every
# PR; they explode job count (~N features × images) and burn Actions minutes.

name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.select.outputs.features }}
      scenarios: ${{ steps.select.outputs.scenarios }}
      has_features: ${{ steps.select.outputs.has_features }}
      has_scenarios: ${{ steps.select.outputs.has_scenarios }}
      base_image: ${{ steps.select.outputs.base_image }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          base_image="mcr.microsoft.com/devcontainers/base:ubuntu"
          echo "base_image=${base_image}" >> "$GITHUB_OUTPUT"

          mapfile -t all_arr < <(
            find src -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort
          )
          selected_arr=()

          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "${BASE_REF:-}" ]; then
            if git fetch --no-tags --depth=1 origin "$BASE_REF"; then
              mapfile -t changed_arr < <(
                git diff --name-only "origin/${BASE_REF}...HEAD" \
                  | grep -E '^(src|test)/[^/]+/' \
                  | cut -d/ -f2 \
                  | sort -u || true
              )
              # Workflow/test harness changes affect all features — run full set.
              if git diff --name-only "origin/${BASE_REF}...HEAD" \
                  | grep -qE '^(\.github/workflows/test\.yaml|scripts/)'; then
                selected_arr=("${all_arr[@]}")
                echo "PR touches test harness/workflows — testing all features."
              elif [ "${#changed_arr[@]}" -gt 0 ]; then
                mapfile -t selected_arr < <(
                  comm -12 \
                    <(printf '%s\n' "${changed_arr[@]}") \
                    <(printf '%s\n' "${all_arr[@]}")
                )
                echo "PR changed features:"
                if [ "${#selected_arr[@]}" -gt 0 ]; then
                  printf '%s\n' "${selected_arr[@]}"
                else
                  echo "(none — feature test matrices will be skipped)"
                fi
              else
                echo "PR changed no feature paths — feature test matrices will be skipped."
              fi
            else
              echo "WARN: could not fetch origin/${BASE_REF}; testing all features."
              selected_arr=("${all_arr[@]}")
            fi
          else
            selected_arr=("${all_arr[@]}")
            echo "Branch/dispatch (or missing base_ref) — testing all features."
          fi

          features_json="$(
            if [ "${#selected_arr[@]}" -gt 0 ]; then
              printf '%s\n' "${selected_arr[@]}"
            fi | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )"

          scenarios_json="$(
            if [ "${#selected_arr[@]}" -gt 0 ]; then
              for id in "${selected_arr[@]}"; do
                if [ -f "test/${id}/scenarios.json" ]; then
                  printf '%s\n' "$id"
                fi
              done
            fi | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )"

          echo "features=${features_json}" >> "$GITHUB_OUTPUT"
          echo "scenarios=${scenarios_json}" >> "$GITHUB_OUTPUT"

          if [ "$features_json" = "[]" ]; then
            echo "has_features=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_features=true" >> "$GITHUB_OUTPUT"
          fi
          if [ "$scenarios_json" = "[]" ]; then
            echo "has_scenarios=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_scenarios=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Selected features JSON: ${features_json}"
          echo "Selected scenarios JSON: ${scenarios_json}"

  # Default-install tests — one base image to keep job count ~N instead of ~3N.
  test-autogenerated:
    needs: [setup]
    if: needs.setup.outputs.has_features == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ${{ fromJSON(needs.setup.outputs.features) }}
        exclude:
          # Network-heavy defaults; covered by scenario tests when present.
          - features: claude-code-skills
          - features: claude-code-plugins
          - features: devcontainer-ci-tools
          - features: direnv-integration
          - features: taskfile-dev
          - features: docker-compose-helper
          - features: nix-package-manager
          - features: podman-checkpoint-helper
          - features: otel-collector-dev
          - features: sops-secret-manager
          - features: git-hooks-manager
          - features: mkdocs-material
          - features: act-runner
          - features: bruno-api-testing
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Autogenerated test for '${{ matrix.features }}'"
        run: |
          devcontainer features test \
            --skip-scenarios \
            -f ${{ matrix.features }} \
            -i ${{ needs.setup.outputs.base_image }} \
            .

  # Scenario tests only for selected features that define scenarios.json.
  test-scenarios:
    needs: [setup]
    if: needs.setup.outputs.has_scenarios == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ${{ fromJSON(needs.setup.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Scenario tests for '${{ matrix.features }}'"
        run: |
          devcontainer features test \
            -f ${{ matrix.features }} \
            --skip-autogenerated \
            --skip-duplicated \
            .

  # Cross-feature integration — single job, always run.
  test-global:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .

  test-summary:
    runs-on: ubuntu-latest
    needs: [test-autogenerated, test-scenarios, test-global]
    if: always()
    steps:
      - name: Evaluate test results
        run: |
          auto="${{ needs.test-autogenerated.result }}"
          scen="${{ needs.test-scenarios.result }}"
          glob="${{ needs.test-global.result }}"

          echo "test-autogenerated=$auto"
          echo "test-scenarios=$scen"
          echo "test-global=$glob"

          # Skipped matrix jobs are OK (e.g. docs-only PR with no feature paths).
          failed=0
          if [[ "$auto" == "failure" ]]; then
            echo "FAIL: test-autogenerated"; failed=1
          fi
          if [[ "$scen" == "failure" ]]; then
            echo "FAIL: test-scenarios"; failed=1
          fi
          if [[ "$glob" == "failure" ]]; then
            echo "FAIL: test-global"; failed=1
          fi

          if [ "$failed" -eq 1 ]; then
            echo "One or more required test jobs failed."
            exit 1
          fi
          echo "All required test jobs passed (or were intentionally skipped)."
