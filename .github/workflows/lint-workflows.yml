# Lint GitHub Actions workflows
#
# Triggered on every push to main, every pull request, and manual dispatch.
# Runs actionlint (https://github.com/rhysd/actionlint) against every workflow
# file to catch syntax errors, missing permissions, insecure expressions, and
# other GitHub Actions-specific issues.

name: "Lint workflows"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: "Install actionlint"
        run: uv tool install actionlint
      - name: "Lint workflow files"
        run: uv run actionlint .github/workflows/*.yml .github/workflows/*.yaml
